name: 🐛 Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to step '...'
        2. Enter '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which part?
      options:
        - UI / layout
        - Calculation (ISR / ISP / ISE / ISEEU / ISPEU)
        - Persistence (saved data)
        - Sharing / image export
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS and device.
      placeholder: e.g. Chrome 126, macOS, desktop
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Screenshots / additional context
      description: Optional. Drag & drop screenshots here.
  - type: markdown
    attributes:
      value: |
        > ⚠️ This is an **estimation** tool. If the result differs from an official CAF figure, that alone is not a bug — please point to the specific rule/source you believe is implemented incorrectly.
